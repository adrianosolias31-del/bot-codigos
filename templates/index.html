<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BotVoz IA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050a0f;color:#c8d8e8;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{color:#00e5ff;margin:16px;letter-spacing:4px;font-size:1.4rem}
#statusBar{display:flex;gap:12px;font-size:0.7rem;color:#888;padding:8px;flex-wrap:wrap;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:#39ff14;display:inline-block;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#chat{flex:1;width:95%;max-width:600px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.user{align-self:flex-end;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:10px 14px;border-radius:10px;max-width:85%}
.bot{align-self:flex-start;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:10px 14px;border-radius:10px;max-width:85%}
#orbeArea{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px}
#orbe{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.3),rgba(0,50,80,0.8));border:2px solid #00e5ff;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all 0.3s}
#orbe.ouvindo{border-color:#ff6b35;box-shadow:0 0 40px rgba(255,107,53,0.6);animation:respirar 0.8s infinite}
#orbe.falando{border-color:#39ff14;box-shadow:0 0 40px rgba(57,255,20,0.6)}
@keyframes respirar{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}
#statusVoz{font-size:0.75rem;color:#888;letter-spacing:2px}
#modoAuto{background:rgba(57,255,20,0.1);border:1px solid #39ff14;color:#39ff14;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:0.8rem}
#modoAuto.ativo{background:rgba(57,255,20,0.3)}
#inputArea{display:flex;gap:8px;padding:0 12px 16px;width:95%;max-width:600px}
#txt{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(0,229,255,0.2);border-radius:8px;padding:10px;color:#c8d8e8;font-family:monospace}
#btnEnv{background:transparent;border:1px solid rgba(0,229,255,0.4);color:#00e5ff;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:monospace}
</style>
</head>
<body>
<h1>⬡ BOTVOZ IA</h1>
<div id="statusBar">
  <span><span class="dot"></span> ONLINE 24H</span>
  <span>INTERAÇÕES: <span id="sInt">0</span></span>
  <span>EVOLUÇÕES: <span id="sEvo">0</span></span>
  <span id="sHora"></span>
</div>
<div id="chat">
  <div class="bot">🤖 BotVoz ativo! Toque em MODO AUTO para eu ouvir automaticamente.</div>
</div>
<div id="orbeArea">
  <div id="orbe">🎤</div>
  <div id="statusVoz">TOQUE O ORBE OU ATIVE MODO AUTO</div>
  <button id="modoAuto" onclick="toggleAuto()">🔄 MODO AUTO: OFF</button>
</div>
<div id="inputArea">
  <input id="txt" type="text" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')enviar()"/>
  <button id="btnEnv" onclick="enviar()">▶</button>
</div>
<script>
const API = "";
let rec = null, ouvindo = false, modoAuto = false, falando = false;

// Relógio
setInterval(() => {
  document.getElementById("sHora").textContent = new Date().toLocaleTimeString("pt-BR");
}, 1000);

// Falar
function falar(texto) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(texto);
  u.lang = "pt-BR"; u.rate = 1.05;
  const v = speechSynthesis.getVoices().find(x => x.lang.startsWith("pt"));
  if (v) u.voice = v;
  const orbe = document.getElementById("orbe");
  u.onstart = () => { falando = true; orbe.classList.add("falando"); orbe.textContent = "🔊"; };
  u.onend = () => {
    falando = false;
    orbe.classList.remove("falando");
    orbe.textContent = "🎤";
    if (modoAuto) setTimeout(iniciarOuvir, 500);
  };
  speechSynthesis.speak(u);
}

// Adicionar mensagem
function addMsg(tipo, texto) {
  const c = document.getElementById("chat");
  const d = document.createElement("div");
  d.className = tipo; d.textContent = texto;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

// Enviar
async function enviar(msg) {
  const t = msg || document.getElementById("txt").value.trim();
  if (!t) return;
  document.getElementById("txt").value = "";
  addMsg("user", t);
  try {
    const r = await fetch(`${API}/chat`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({mensagem: t, autorizado: true})
    });
    const d = await r.json();
    addMsg("bot", d.resposta);
    falar(d.resposta);
    if (d.interacoes) document.getElementById("sInt").textContent = d.interacoes;
    if (d.evolucoes !== undefined) document.getElementById("sEvo").textContent = d.evolucoes;
  } catch(e) {
    addMsg("bot", "Erro de conexão.");
    if (modoAuto) setTimeout(iniciarOuvir, 2000);
  }
}

// Ouvir
function iniciarOuvir() {
  if (ouvindo || falando) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  rec = new SR();
  rec.lang = "pt-BR"; rec.continuous = false; rec.interimResults = false;
  rec.onstart = () => {
    ouvindo = true;
    document.getElementById("orbe").classList.add("ouvindo");
    document.getElementById("orbe").textContent = "👂";
    document.getElementById("statusVoz").textContent = "OUVINDO...";
  };
  rec.onresult = e => {
    const t = e.results[0][0].transcript;
    ouvindo = false;
    document.getElementById("orbe").classList.remove("ouvindo");
    document.getElementById("statusVoz").textContent = modoAuto ? "MODO AUTO ATIVO" : "TOQUE PARA FALAR";
    enviar(t);
  };
  rec.onerror = () => {
    ouvindo = false;
    document.getElementById("orbe").classList.remove("ouvindo");
    document.getElementById("orbe").textContent = "🎤";
    if (modoAuto) setTimeout(iniciarOuvir, 2000);
  };
  rec.onend = () => {
    ouvindo = false;
    document.getElementById("orbe").classList.remove("ouvindo");
    if (!falando && modoAuto) setTimeout(iniciarOuvir, 500);
  };
  try { rec.start(); } catch(e) {}
}

// Toggle auto
function toggleAuto() {
  modoAuto = !modoAuto;
  const btn = document.getElementById("modoAuto");
  btn.textContent = modoAuto ? "🔄 MODO AUTO: ON" : "🔄 MODO AUTO: OFF";
  btn.classList.toggle("ativo", modoAuto);
  document.getElementById("statusVoz").textContent = modoAuto ? "MODO AUTO ATIVO" : "TOQUE PARA FALAR";
  if (modoAuto) {
    falar("Modo automático ativado. Estou ouvindo você, administrador!");
  } else {
    speechSynthesis.cancel();
    if (rec) try { rec.stop(); } catch(e) {}
  }
}

// Orbe manual
document.getElementById("orbe").onclick = () => {
  if (!modoAuto) iniciarOuvir();
};

speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
setTimeout(() => falar("BotVoz iniciado! Toque em Modo Auto para ativação contínua."), 1000);
</script>
</body>
</html>
