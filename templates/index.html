<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BotVoz IA</title>
</head>
<body style="background:#050a0f;color:#c8d8e8;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;margin:0">
<h1 style="color:#00e5ff;margin:20px;letter-spacing:4px">⬡ BOTVOZ IA</h1>
<div id="chat" style="flex:1;width:95%;max-width:600px;overflow-y:auto;padding:10px"></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px">
<div id="orbe" onclick="toggleOuvir()" style="width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.3),rgba(0,50,80,0.8));border:2px solid #00e5ff;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer">🎤</div>
<div id="statusVoz" style="font-size:0.75rem;color:rgba(200,216,232,0.5)">TOQUE PARA FALAR</div>
</div>
<div style="display:flex;gap:8px;padding:0 16px 16px;width:95%;max-width:600px">
<input id="txt" type="text" placeholder="Digite ou fale..." onkeydown="if(event.key==='Enter')enviar()" style="flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(0,229,255,0.2);border-radius:8px;padding:12px;color:#c8d8e8;font-family:monospace"/>
<button onclick="enviar()" style="background:transparent;border:1px solid rgba(0,229,255,0.4);color:#00e5ff;padding:12px 20px;border-radius:8px;cursor:pointer">ENVIAR</button>
</div>
<script>
const API="";
let rec=null,ouv=false;
function msg(t,txt){const d=document.getElementById("chat");const m=document.createElement("div");m.style.cssText=`margin:8px 0;padding:10px 14px;border-radius:10px;max-width:85%;${t==="user"?"align-self:flex-end;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;margin-left:auto":"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1)"}`;m.textContent=txt;d.appendChild(m);d.scrollTop=d.scrollHeight;}
function falar(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="pt-BR";const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith("pt"));if(v)u.voice=v;speechSynthesis.speak(u);}
async function enviar(m,auth=false){const t=m||document.getElementById("txt").value.trim();if(!t)return;document.getElementById("txt").value="";msg("user",t);try{const r=await fetch(`${API}/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mensagem:t,autorizado:auth})});const d=await r.json();if(d.precisa_autorizacao){if(confirm("Autorizar: "+t+"?")){enviar(t,true);}return;}msg("bot",d.resposta);falar(d.resposta);}catch(e){msg("bot","Erro de conexão.");}}
function toggleOuvir(){if(ouv){if(rec)rec.stop();return;}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Use Chrome para voz!");return;}rec=new SR();rec.lang="pt-BR";rec.onstart=()=>{ouv=true;document.getElementById("orbe").textContent="👂";document.getElementById("statusVoz").textContent="OUVINDO...";};rec.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById("txt").value=t;enviar(t);};rec.onend=()=>{ouv=false;document.getElementById("orbe").textContent="🎤";document.getElementById("statusVoz").textContent="TOQUE PARA FALAR";};rec.start();}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
setTimeout(()=>falar("BotVoz iniciado!"),1000);
</script>
</body>
</html>
