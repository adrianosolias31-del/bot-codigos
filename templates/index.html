<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BotVoz IA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050a0f;color:#c8d8e8;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1{color:#00e5ff;margin:16px;letter-spacing:4px;font-size:1.4rem;text-align:center}
#statusBar{display:flex;gap:12px;font-size:0.7rem;color:#888;padding:8px;flex-wrap:wrap;justify-content:center;border-bottom:1px solid #111;width:100%}
.dot{width:8px;height:8px;border-radius:50%;background:#39ff14;display:inline-block;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#chat{flex:1;width:95%;max-width:600px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:200px}
.user{align-self:flex-end;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:#00e5ff;padding:10px 14px;border-radius:10px;max-width:85%}
.bot{align-self:flex-start;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:10px 14px;border-radius:10px;max-width:85%}
#orbeArea{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px}
#orbe{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.3),rgba(0,50,80,0.8));border:2px solid #00e5ff;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all 0.3s}
#orbe.ouvindo{border-color:#ff6b35;box-shadow:0 0 40px rgba(255,107,53,0.6)}
#orbe.falando{border-color:#39ff14;box-shadow:0 0 40px rgba(57,255,20,0.6)}
#statusVoz{font-size:0.75rem;color:#888;letter-spacing:2px}
#modoAuto{background:rgba(0,0,0,0.5);border:2px solid #39ff14;color:#39ff14;padding:12px 24px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:0.9rem;font-weight:bold;display:block;margin:0 auto}
#modoAuto.ativo{background:rgba(57,255,20,0.2)}
#inputArea{display:flex;gap:8px;padding:12px;width:95%;max-width:600px}
#txt{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(0,229,255,0.2);border-radius:8px;padding:10px;color:#c8d8e8;font-family:monospace;font-size:0.9rem}
#btnEnv{background:transparent;border:1px solid rgba(0,229,255,0.4);color:#00e5ff;padding:10px 16px;border-radius:8px;cursor:pointer;font-family:monospace}
</style>
</head>
<body>
<h1>⬡ BOTVOZ IA</h1>
<div id="statusBar">
  <span><span class="dot"></span> ONLINE 24H</span>
  <span>INTERAÇÕES: <span id="sInt">0</span></span>
  <span>EVOLUÇÕES: <span id="sEvo">0</span></span>
  <span id="sHora"></span>
</div>
<div id="chat">
  <div class="bot">🤖 BotVoz ativo! Toque em MODO AUTO para ouvir automaticamente.</div>
</div>
<div id="orbeArea">
  <div id="orbe" onclick="orbeClick()">🎤</div>
  <div id="statusVoz">TOQUE PARA FALAR</div>
  <button id="modoAuto" onclick="toggleAuto()">🔄 MODO AUTO: OFF</button>
</div>
<div id="inputArea">
  <input id="txt" type="text" placeholder="Digite ou fale..." onkeydown="if(event.key==='Enter')enviar()"/>
  <button id="btnEnv" onclick="enviar()">ENVIAR</button>
</div>
<script>
const API="";
let rec=null,ouvindo=false,modoAuto=false,falando=false;

setInterval(()=>{
  document.getElementById("sHora").textContent=new Date().toLocaleTimeString("pt-BR");
},1000);

function falar(texto){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(texto);
  u.lang="pt-BR";u.rate=1.05;
  const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith("pt"));
  if(v)u.voice=v;
  const orbe=document.getElementById("orbe");
  u.onstart=()=>{falando=true;orbe.classList.add("falando");orbe.textContent="🔊";};
  u.onend=()=>{falando=false;orbe.classList.remove("falando");orbe.textContent="🎤";if(modoAuto)setTimeout(iniciarOuvir,500);};
  speechSynthesis.speak(u);
}

function addMsg(tipo,texto){
  const c=document.getElementById("chat");
  const d=document.createElement("div");
  d.className=tipo;d.textContent=texto;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

async function enviar(msg){
  const t=msg||document.getElementById("txt").value.trim();
  if(!t)return;
  document.getElementById("txt").value="";
  addMsg("user",t);
  try{
    const r=await fetch(`${API}/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mensagem:t,autorizado:true})});
    const d=await r.json();
    addMsg("bot",d.resposta);
    falar(d.resposta);
    if(d.interacoes)document.getElementById("sInt").textContent=d.interacoes;
    if(d.evolucoes!==undefined)document.getElementById("sEvo").textContent=d.evolucoes;
  }catch(e){
    addMsg("bot","Erro de conexão.");
    if(modoAuto)setTimeout(iniciarOuvir,2000);
  }
}

function iniciarOuvir(){
  if(ouvindo||falando)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addMsg("bot","Use Chrome para voz!");return;}
  rec=new SR();
  rec.lang="pt-BR";rec.continuous=false;rec.interimResults=false;
  rec.onstart=()=>{ouvindo=true;document.getElementById("orbe").classList.add("ouvindo");document.getElementById("orbe").textContent="👂";document.getElementById("statusVoz").textContent="OUVINDO...";};
  rec.onresult=e=>{const t=e.results[0][0].transcript;ouvindo=false;document.getElementById("orbe").classList.remove("ouvindo");document.getElementById("statusVoz").textContent=modoAuto?"MODO AUTO ATIVO":"TOQUE PARA FALAR";enviar(t);};
  rec.onerror=()=>{ouvindo=false;document.getElementById("orbe").classList.remove("ouvindo");document.getElementById("orbe").textContent="🎤";if(modoAuto)setTimeout(iniciarOuvir,2000);};
  rec.onend=()=>{ouvindo=false;document.getElementById("orbe").classList.remove("ouvindo");if(!falando&&modoAuto)setTimeout(iniciarOuvir,500);};
  try{rec.start();}catch(e){}
}

function toggleAuto(){
  modoAuto=!modoAuto;
  const btn=document.getElementById("modoAuto");
  btn.textContent=modoAuto?"🔄 MODO AUTO: ON":"🔄 MODO AUTO: OFF";
  btn.classList.toggle("ativo",modoAuto);
  document.getElementById("statusVoz").textContent=modoAuto?"MODO AUTO ATIVO":"TOQUE PARA FALAR";
  if(modoAuto){falar("Modo automático ativado. Estou ouvindo você, administrador!");}
  else{speechSynthesis.cancel();if(rec)try{rec.stop();}catch(e){}}
}

function orbeClick(){if(!modoAuto)iniciarOuvir();}

speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
setTimeout(()=>falar("BotVoz iniciado!"),1000);
</script>
</body>
</html>
